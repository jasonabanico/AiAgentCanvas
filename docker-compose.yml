services:
  backend:
    build:
      context: .
      dockerfile: src/AiAgentCanvas.Web/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - AIFoundry__Endpoint=https://YOUR-RESOURCE.openai.azure.com
      - AIFoundry__Key=${AIFOUNDRY_KEY:-}
      - AIFoundry__DeploymentName=gpt-4o
      - AIFoundry__UseAzureCredential=false

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://backend:5000
    depends_on:
      - backend
